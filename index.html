<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glow Finance</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <main id="app-content">
        <section id="home-page" class="page active">
            
            <div class="section-title" style="margin-top: 20px;">
                <h3>Bank Accounts</h3>
                <button class="add-btn" onclick="openModal('account')">+</button>
            </div>
            <div id="accounts-list" class="grid"></div>

            <div class="section-title" style="margin-top: 30px;">
                <h3>Monthly Bills</h3>
                <button class="add-btn" onclick="openModal('bill')">+</button>
            </div>
            <div id="bills-list" style="padding: 0 20px;"></div>

        </section>

        <section id="debt-page" class="page">
            <div class="section-title" style="margin-top: 20px;">
                <h3>Liabilities</h3>
                <button class="add-btn" onclick="openModal('debt')">+</button>
            </div>
            <div id="debts-list"></div>
        </section>

        <section id="savings-page" class="page">
            <div class="section-title" style="margin-top: 20px;">
                <h3>Saving Pots</h3>
                <button class="add-btn" onclick="openModal('savings')">+</button>
            </div>
            <div id="savings-list" class="grid"></div>
        </section>

        <section id="admin-page" class="page">
            <div class="section-title" style="margin-top: 20px;">
                <h3>Settings</h3>
            </div>
            <button class="danger-btn" onclick="clearAllData()">Reset All Data</button>
        </section>
    </main>

    <nav class="bottom-nav">
        <button class="nav-btn" onclick="switchTab('debt-page', this)"><span>📉</span>Debt</button>
        <button class="nav-btn" onclick="switchTab('savings-page', this)"><span>💎</span>Savings</button>
        <button class="nav-btn active-btn" onclick="switchTab('home-page', this)"><span>🏠</span>Home</button>
        <button class="nav-btn" onclick="switchTab('admin-page', this)"><span>⚙️</span>Admin</button>
    </nav>

    <div id="input-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">Add</h2>
            <input type="text" id="item-name" placeholder="Name (e.g. Monzo, Gas)">
            <input type="number" id="item-amount" placeholder="Amount (£)">
            <input type="number" id="item-date" placeholder="Day of Month (1-31)" style="display:none" min="1" max="31">
            <button class="btn-save" onclick="saveItem()">Save 🚀</button>
            <button onclick="closeModal('input-modal')" class="btn-cancel">Cancel</button>
        </div>
    </div>

    <div id="account-modal" class="modal">
        <div class="modal-content" style="height: 80vh; overflow-y: auto;">
            <h2 id="acc-modal-title">Account</h2>
            <h1 id="acc-modal-balance" style="margin: 10px 0; color: var(--success);">£0.00</h1>
            
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <input type="number" id="tx-amount" placeholder="Amount (£)" style="margin:0;">
                <button class="btn-save" style="margin:0; width: 60px;" onclick="addTransaction('in')">+ In</button>
                <button class="danger-btn" style="margin:0; width: 60px; padding: 15px;" onclick="addTransaction('out')">- Out</button>
            </div>

            <h3 style="margin-bottom: 15px; color: #94a3b8;">Recent Transactions</h3>
            <div id="transactions-list"></div>
            
            <button onclick="closeModal('account-modal')" class="btn-cancel" style="margin-top: 20px;">Close</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
