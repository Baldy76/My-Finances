<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Command Centre</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen p-6 font-sans flex items-start justify-center pt-10 pb-20">

    <div id="root" class="w-full max-w-md"></div>

    <script type="text/babel">
        const { useState } = React;

        function CommandCentre() {
            const [selectedAccount, setSelectedAccount] = useState('');
            const [chargeAmount, setChargeAmount] = useState('');
            // New state to hold our list of transactions
            const [transactions, setTransactions] = useState([]);

            const handleAccountChange = (e) => {
                setSelectedAccount(e.target.value);
            };

            const handleAmountChange = (e) => {
                setChargeAmount(e.target.value);
            };

            const handleLogCharge = () => {
                // Validation
                if (!chargeAmount || chargeAmount <= 0) {
                    alert("Please enter a valid charge amount.");
                    return;
                }
                
                // Create a new transaction record
                const newTransaction = {
                    id: Date.now(), // Unique ID for React
                    account: selectedAccount,
                    amount: parseFloat(chargeAmount).toFixed(2),
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                };

                // Add the new transaction to the beginning of our list
                setTransactions([newTransaction, ...transactions]);
                
                // Clear the input
                setChargeAmount('');
            };

            return (
                <div className="flex flex-col gap-6">
                    {/* Main Input Card */}
                    <div className="p-8 bg-white rounded-2xl shadow-xl border border-gray-100">
                        <h2 className="text-2xl font-bold text-gray-800 mb-6 tracking-tight">Log Transaction</h2>
                        
                        {/* Account Dropdown */}
                        <div className="mb-6">
                            <label htmlFor="account-type" className="block text-sm font-medium text-gray-500 mb-2">
                                Select Funding Source
                            </label>
                            <div className="relative">
                                <select
                                    id="account-type"
                                    value={selectedAccount}
                                    onChange={handleAccountChange}
                                    className="block w-full pl-4 pr-10 py-3 text-base border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent sm:text-sm rounded-xl bg-gray-50 transition ease-in-out duration-200 cursor-pointer shadow-sm hover:bg-gray-100"
                                >
                                    <option value="" disabled>Choose an account...</option>
                                    <option value="Bank Account">Bank Account</option>
                                    <option value="Savings Account">Savings Account</option>
                                    <option value="Credit Card">Credit Card</option>
                                    <option value="Bank Loan">Bank Loan</option>
                                    <option value="PayPal">PayPal</option>
                                    <option value="Klarna">Klarna</option>
                                </select>
                            </div>
                        </div>

                        {/* Smooth transition for the Amount Input AND the Button */}
                        <div 
                            className={`transition-all duration-500 ease-in-out overflow-hidden ${
                                selectedAccount === 'Credit Card' ? 'max-h-48 opacity-100 mt-4' : 'max-h-0 opacity-0 mt-0'
                            }`}
                        >
                            {/* Amount Input */}
                            <div className="mb-5">
                                <label htmlFor="charge-amount" className="block text-sm font-medium text-gray-500 mb-2">
                                    Charge Amount
                                </label>
                                <div className="relative">
                                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                        <span className="text-gray-500 font-medium sm:text-sm">£</span>
                                    </div>
                                    <input
                                        type="number"
                                        id="charge-amount"
                                        value={chargeAmount}
                                        onChange={handleAmountChange}
                                        placeholder="0.00"
                                        step="0.01"
                                        min="0"
                                        className="block w-full pl-8 pr-4 py-3 text-base border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent sm:text-sm rounded-xl bg-gray-50 transition ease-in-out duration-200 shadow-sm hover:bg-gray-100"
                                    />
                                </div>
                            </div>

                            {/* Submit Button */}
                            <button
                                onClick={handleLogCharge}
                                className="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-md text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-600 transition-all duration-300 transform hover:-translate-y-0.5 active:translate-y-0"
                            >
                                Log Credit Card Charge
                            </button>
                        </div>
                    </div>

                    {/* Session History Card (Only shows if there are transactions) */}
                    {transactions.length > 0 && (
                        <div className="p-6 bg-white rounded-2xl shadow-md border border-gray-100 transition-all duration-500 animate-fade-in-up">
                            <h3 className="text-lg font-semibold text-gray-800 mb-4 border-b pb-2">Session History</h3>
                            <ul className="space-y-3 max-h-60 overflow-y-auto pr-2">
                                {transactions.map((tx) => (
                                    <li key={tx.id} className="flex justify-between items-center bg-gray-50 p-3 rounded-lg border border-gray-100">
                                        <div className="flex flex-col">
                                            <span className="text-sm font-medium text-gray-800">{tx.account}</span>
                                            <span className="text-xs text-gray-400">{tx.time}</span>
                                        </div>
                                        <span className="text-base font-bold text-gray-900">£{tx.amount}</span>
                                    </li>
                                ))}
                            </ul>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CommandCentre />);
    </script>
    
    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.4s ease-out forwards;
        }
    </style>
</body>
</html>
