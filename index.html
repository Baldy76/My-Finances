<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Command Centre</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen p-6 font-sans flex items-start justify-center pt-10 pb-20">

    <div id="root" class="w-full max-w-md"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function CommandCentre() {
            const [selectedAccount, setSelectedAccount] = useState('');
            const [chargeAmount, setChargeAmount] = useState('');
            
            const [transactions, setTransactions] = useState(() => {
                try {
                    const savedData = localStorage.getItem('commandCentreData');
                    return savedData ? JSON.parse(savedData) : [];
                } catch (error) {
                    console.error("Memory was corrupted, starting fresh.");
                    return [];
                }
            });

            useEffect(() => {
                localStorage.setItem('commandCentreData', JSON.stringify(transactions));
            }, [transactions]);

            const handleAccountChange = (e) => setSelectedAccount(e.target.value);
            const handleAmountChange = (e) => setChargeAmount(e.target.value);

            const handleLogCharge = () => {
                if (!chargeAmount || chargeAmount <= 0) {
                    alert("Please enter a valid charge amount.");
                    return;
                }
                
                const newTransaction = {
                    id: Date.now(),
                    account: selectedAccount,
                    amount: parseFloat(chargeAmount).toFixed(2),
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                };

                setTransactions([newTransaction, ...transactions]);
                setChargeAmount('');
            };

            const handleDeleteTransaction = (idToRemove) => {
                setTransactions(transactions.filter(tx => tx.id !== idToRemove));
            };

            const handleClearSession = () => {
                if(window.confirm("Are you sure you want to clear all logged charges? This cannot be undone.")) {
                    setTransactions([]);
                    localStorage.removeItem('commandCentreData');
                }
            };

            const sessionTotal = transactions.reduce((sum, tx) => sum + parseFloat(tx.amount), 0).toFixed(2);

            return (
                <div className="flex flex-col gap-6">
                    <div className="p-8 bg-white rounded-2xl shadow-xl border border-gray-100">
                        <h2 className="text-2xl font-bold text-gray-800 mb-6 tracking-tight">Log Transaction</h2>
                        
                        <div className="mb-6">
                            <label htmlFor="account-type" className="block text-sm font-medium text-gray-500 mb-2">
                                Select Funding Source
                            </label>
                            <div className="relative">
                                <select
                                    id="account-type"
                                    value={selectedAccount}
                                    onChange={handleAccountChange}
                                    className="block w-full pl-4 pr-10 py-3 text-base border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent sm:text-sm rounded-xl bg-gray-50 transition ease-in-out duration-200 cursor-pointer shadow-sm hover:bg-gray-100"
                                >
                                    <option value="" disabled>Choose an account...</option>
                                    <option value="Bank Account">Bank Account</option>
                                    <option value="Savings Account">Savings Account</option>
                                    <option value="Credit Card">Credit Card</option>
                                    <option value="Bank Loan">Bank Loan</option>
                                    <option value="PayPal">PayPal</option>
                                    <option value="Klarna">Klarna</option>
                                </select>
                            </div>
                        </div>

                        {/* THIS IS THE FIX: The section only renders if Credit Card is selected */}
                        {selectedAccount === 'Credit Card' && (
                            <div className="mt-4 animate-fade-in-up">
                                <div className="mb-5">
                                    <label htmlFor="charge-amount" className="block text-sm font-medium text-gray-500 mb-2">
                                        Charge Amount
                                    </label>
                                    <div className="relative">
                                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                            <span className="text-gray-500 font-medium sm:text-sm">£</span>
                                        </div>
                                        <input
                                            type="number"
                                            id="charge-amount"
                                            value={chargeAmount}
                                            onChange={handleAmountChange}
                                            placeholder="0.00"
                                            step="0.01"
                                            min="0"
                                            className="block w-full pl-8 pr-4 py-3 text-base border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent sm:text-sm rounded-xl bg-gray-50 transition shadow-sm hover:bg-gray-100"
                                        />
                                    </div>
                                </div>

                                <button
                                    onClick={handleLogCharge}
                                    className="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-md text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-600 transition-all duration-300 transform hover:-translate-y-0.5"
                                >
                                    Log Credit Card Charge
                                </button>
                            </div>
                        )}
                    </div>

                    {transactions.length > 0 && (
                        <div className="p-6 bg-white rounded-2xl shadow-md border border-gray-100 transition-all duration-500 animate-fade-in-up">
                            <div className="flex justify-between items-center mb-4 border-b pb-2">
                                <h3 className="text-lg font-semibold text-gray-800">Session History</h3>
                                <button 
                                    onClick={handleClearSession}
                                    className="text-xs font-medium text-red-500 hover:text-red-700 transition-colors"
                                >
                                    Clear All
                                </button>
                            </div>
                            
                            <ul className="space-y-3 max-h-60 overflow-y-auto pr-2 mb-4">
                                {transactions.map((tx) => (
                                    <li key={tx.id} className="flex justify-between items-center bg-gray-50 p-3 rounded-lg border border-gray-100 group">
                                        <div className="flex flex-col">
                                            <span className="text-sm font-medium text-gray-800">{tx.account}</span>
                                            <span className="text-xs text-gray-400">{tx.time}</span>
                                        </div>
                                        <div className="flex items-center gap-3">
                                            <span className="text-base font-semibold text-gray-700">£{tx.amount}</span>
                                            <button 
                                                onClick={() => handleDeleteTransaction(tx.id)}
                                                className="text-gray-300 hover:text-red-500 transition-colors opacity-0 group-hover:opacity-100 focus:opacity-100"
                                                title="Delete entry"
                                            >
                                                ✕
                                            </button>
                                        </div>
                                    </li>
                                ))}
                            </ul>

                            <div className="flex justify-between items-center pt-4 border-t border-gray-200 mt-2">
                                <span className="text-sm font-bold text-gray-800 uppercase tracking-wide">Session Total</span>
                                <span className="text-xl font-black text-blue-600">£{sessionTotal}</span>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CommandCentre />);
    </script>
    
    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.4s ease-out forwards;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</body>
</html>
