<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Finances</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <nav class="top-nav">
            <button id="nav-home" class="active">Home</button>
            <button id="nav-admin">Admin</button>
        </nav>

        <main id="view-home" class="view active-view">
            <header>
                <h1>My Accounts</h1>
                <p>Click an account to simulate a transaction.</p>
            </header>
            <div id="accounts-container" class="accounts-grid">
                </div>
        </main>

        <main id="view-admin" class="view">
            <header>
                <h1>Admin Dashboard</h1>
                <p>Add a new bank account to your portfolio.</p>
            </header>
            
            <form id="add-account-form" class="admin-form">
                <div class="form-group">
                    <label for="bankName">Bank Name</label>
                    <input type="text" id="bankName" required placeholder="e.g. Barclays">
                </div>
                
                <div class="form-group">
                    <label for="initialBalance">Current Balance (£)</label>
                    <input type="number" id="initialBalance" required placeholder="100" step="0.01">
                </div>

                <div class="form-group">
                    <label for="odLimit">Overdraft Limit (£) - Optional</label>
                    <input type="number" id="odLimit" placeholder="500" min="0" step="0.01">
                </div>

                <button type="submit" class="btn-submit">Add Account</button>
            </form>

            <div class="admin-footer">
                <p><strong>Version Control:</strong> v2.0.0 (Clean Slate, UI Upgrades & Local Storage)</p>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
