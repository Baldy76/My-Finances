<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <main id="app-content">
        
        <section id="debt-page" class="page">
            <h2>Debt Management</h2>
            <p>Track your credit cards, loans, and Klarna here.</p>
        </section>

        <section id="savings-page" class="page">
            <h2>Savings Pots</h2>
            <p>Your saving goals and emergency funds.</p>
        </section>

        <section id="home-page" class="page active">
            <h2>Dashboard</h2>
            <div class="card">
                <h3>Total Balance</h3>
                <h2>£0.00</h2>
            </div>
            <p>Your bank accounts will go here.</p>
        </section>

        <section id="admin-page" class="page">
            <h2>Admin Hub</h2>
            <p>Settings, profile, and account connections.</p>
        </section>

    </main>

    <nav class="bottom-nav">
        <button class="nav-btn" onclick="switchTab('debt-page', this)">Debt</button>
        <button class="nav-btn" onclick="switchTab('savings-page', this)">Savings</button>
        <button class="nav-btn active-btn" onclick="switchTab('home-page', this)">Home</button>
        <button class="nav-btn" onclick="switchTab('admin-page', this)">Admin</button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
