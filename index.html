<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <div class="header">Admin Panel</div>

    <div class="settings-group">
        <div class="settings-row">
            <div class="row-label">
                <div class="icon" style="background-color: #5E5CE6;">✨</div>
                <span>Appearance</span>
            </div>
            <label class="ios-toggle">
                <input type="checkbox" id="themeToggle">
                <span class="slider"></span>
            </label>
        </div>

        <div class="settings-row">
            <div class="row-label">
                <div class="icon" style="background-color: #FF9500;">⚙️</div>
                <span>Advanced Settings</span>
            </div>
            <span class="chevron">></span>
        </div>
    </div>

    <div class="admin-footer">
        <div class="version-control">App Version 2.4.1 (Build 842)</div>
        <div class="developer-mode">Deployed via GitHub Pages</div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
