<div id="edit-modal" class="bottom-sheet">
            <div class="sheet-header">Edit Item</div>
            <form id="edit-form" class="admin-form" style="padding-top: 5px;">
                <input type="text" id="editName" placeholder="Item Name" required>
                <input type="number" id="editBalance" placeholder="Amount / Balance (£)" step="0.01" required>
                
                <div id="edit-date-wrapper" style="display:none;">
                    <select id="editDay" class="ios-select" style="margin-bottom: 12px;">
                        <option value="" disabled selected>Select Day Due</option>
                    </select>
                </div>

                <div id="edit-od-wrapper" style="display:none;">
                    <input type="number" id="editOdLimit" placeholder="New Overdraft Limit (£)" step="0.01">
                </div>
                <div id="edit-card-wrapper" style="display:none;">
                    <input type="number" id="editCardLimit" placeholder="New Credit Limit (£)" step="0.01">
                </div>

                <button type="submit" class="ios-btn" style="margin-top: 10px;">Save Changes</button>
                <button type="button" id="delete-btn" class="ios-btn" style="background-color: #FF3B30; margin-top: 10px;">Delete Item</button>
            </form>
        </div>
