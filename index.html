<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Command Center</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            halifax: '#0033A0',
            barclays: '#00AEFF',
            starling: '#00E6C3',
            darkbg: '#0F172A',
            cardbg: '#1E293B',
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #0F172A; color: white; font-family: sans-serif; padding-bottom: 6rem; }
    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  </style>
</head>
<body class="p-4 relative min-h-screen">

  <header class="flex justify-between items-center mb-6 pt-4">
    <div>
      <h1 class="text-2xl font-bold">Command Center 🚀</h1>
      <p class="text-gray-400 text-sm">Welcome back, Boss.</p>
    </div>
  </header>

  <div class="bg-gradient-to-br from-cardbg to-gray-900 rounded-3xl p-6 border border-gray-800 shadow-xl text-center mb-8 relative overflow-hidden">
    <div class="absolute -top-10 -right-10 w-32 h-32 bg-starling opacity-10 rounded-full blur-3xl"></div>
    
    <p class="text-gray-400 font-medium mb-1 relative z-10">Safe to Spend</p>
    <h2 class="text-5xl font-extrabold tracking-tight transition-colors duration-300 relative z-10" id="safe-to-spend">£0.00</h2>
    
    <div class="w-full bg-gray-800 rounded-full h-1.5 mt-5 mb-2 overflow-hidden relative z-10">
      <div id="cash-bar" class="bg-starling h-1.5 rounded-full transition-all duration-1000 ease-out" style="width: 0%"></div>
    </div>
    <div class="flex justify-between text-[10px] text-gray-500 font-bold uppercase tracking-wider relative z-10 mb-4">
      <span>Safe: <span id="safe-percent">0%</span></span>
      <span>Bills: <span id="bills-percent">0%</span></span>
    </div>

    <p class="text-xs text-gray-400 border-t border-gray-700/50 pt-3 relative z-10">
      Total Cash: <span id="total-cash" class="font-bold text-white">£0.00</span> | Bills: <span id="display-bills" class="font-bold text-red-400">£0.00</span>
    </p>
  </div>

  <h3 class="text-lg font-semibold mb-4">Your Vaults 🏦</h3>
  <div class="space-y-3">
    
    <div class="flex justify-between items-center bg-cardbg p-4 rounded-2xl border-l-4 border-halifax shadow-md">
      <div class="flex items-center gap-3">
        <div class="bg-halifax text-white p-2 rounded-full font-bold text-xs">HX</div>
        <p class="font-medium">Halifax Joint</p>
      </div>
      <p class="font-bold text-lg" id="display-halifax">£0.00</p>
    </div>

    <div class="flex justify-between items-center bg-cardbg p-4 rounded-2xl border-l-4 border-barclays shadow-md">
      <div class="flex items-center gap-3">
        <div class="bg-barclays text-white p-2 rounded-full font-bold text-xs">BC</div>
        <div>
          <p class="font-medium">Barclays Current</p>
          <span class="text-xs text-red-400 hidden font-semibold" id="barclays-warning">Overdraft Active 🚨</span>
        </div>
      </div>
      <p class="font-bold text-lg transition-colors" id="display-barclays">£0.00</p>
    </div>

    <div class="flex justify-between items-center bg-cardbg p-4 rounded-2xl border-l-4 border-starling shadow-md">
      <div class="flex items-center gap-3">
        <div class="bg-starling text-gray-900 p-2 rounded-full font-bold text-xs">ST</div>
        <p class="font-medium">Starling Savings</p>
      </div>
      <p class="font-bold text-lg" id="display-starling">£0.00</p>
    </div>

  </div>

  <nav class="fixed bottom-0 left-0 w-full bg-cardbg/95 backdrop-blur-xl border-t border-gray-800 p-4 flex justify-around items-center rounded-t-3xl z-40 pb-6">
    <button class="flex flex-col items-center text-gray-500 hover:text-white transition-colors">
      <span class="text-2xl">🏠</span>
      <span class="text-[10px] mt-1 font-bold tracking-wide">HOME</span>
    </button>
    <button class="flex flex-col items-center text-gray-500 hover:text-white transition-colors">
      <span class="text-2xl">🎯</span>
      <span class="text-[10px] mt-1 font-bold tracking-wide">GOALS</span>
    </button>
    
    <button id="add-btn" class="flex flex-col items-center text-starling -mt-12 bg-darkbg rounded-full p-4 border-4 border-cardbg shadow-xl transform active:scale-90 transition-transform duration-200">
      <span class="text-3xl">➕</span>
    </button>
    
    <button class="flex flex-col items-center text-gray-500 hover:text-white transition-colors">
      <span class="text-2xl">🏦</span>
      <span class="text-[10px] mt-1 font-bold tracking-wide">VAULT</span>
    </button>
  </nav>

  <div id="update-modal" class="fixed inset-0 bg-black/90 z-50 hidden flex-col justify-end transition-opacity duration-300 backdrop-blur-sm">
    <div class="bg-cardbg rounded-t-3xl p-6 border-t border-gray-700 pb-12 animate-slide-up shadow-2xl">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold">Update Balances</h2>
        <button id="close-modal" class="text-gray-400 hover:text-white text-2xl w-10 h-10 flex justify-center items-center rounded-full bg-gray-800">✕</button>
      </div>
      
      <div class="space-y-4 mb-6">
        <div class="grid grid-cols-2 gap-4">
          <div class="col-span-2">
            <label class="text-xs text-halifax font-bold mb-1 block uppercase tracking-wide">Halifax Joint (£)</label>
            <input type="number" id="input-halifax" class="w-full bg-darkbg border border-gray-700 rounded-xl p-4 text-white text-xl focus:border-halifax focus:ring-1 focus:ring-halifax focus:outline-none transition-all" placeholder="0.00">
          </div>
          <div>
            <label class="text-xs text-barclays font-bold mb-1 block uppercase tracking-wide">Barclays (£)</label>
            <input type="number" id="input-barclays" class="w-full bg-darkbg border border-gray-700 rounded-xl p-4 text-white text-xl focus:border-barclays focus:ring-1 focus:ring-barclays focus:outline-none transition-all" placeholder="0.00">
          </div>
          <div>
            <label class="text-xs text-starling font-bold mb-1 block uppercase tracking-wide">Starling (£)</label>
            <input type="number" id="input-starling" class="w-full bg-darkbg border border-gray-700 rounded-xl p-4 text-white text-xl focus:border-starling focus:ring-1 focus:ring-starling focus:outline-none transition-all" placeholder="0.00">
          </div>
        </div>
        
        <div class="pt-2">
          <label class="text-xs text-red-400 font-bold mb-1 block uppercase tracking-wide">Pending Bills to Deduct (£)</label>
          <input type="number" id="input-bills" class="w-full bg-red-900/20 border border-red-900/50 rounded-xl p-4 text-red-100 text-xl focus:border-red-500 focus:ring-1 focus:ring-red-500 focus:outline-none transition-all" placeholder="0.00">
        </div>
      </div>

      <button id="save-btn" class="w-full bg-starling text-gray-900 font-extrabold text-lg p-4 rounded-xl shadow-lg shadow-starling/20 active:scale-95 transition-all duration-200">
        Save & Calculate
      </button>
    </div>
  </div>

  <script>
    const modal = document.getElementById('update-modal');
    const addBtn = document.getElementById('add-btn');
    const closeBtn = document.getElementById('close-modal');
    const saveBtn = document.getElementById('save-btn');

    // UI Triggers
    addBtn.addEventListener('click', () => {
      // Haptic feedback (if supported by phone)
      if (navigator.vibrate) navigator.vibrate(50);
      modal.classList.remove('hidden');
      modal.classList.add('flex');
    });

    closeBtn.addEventListener('click', () => {
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    });

    // The Core Brain
    function updateApp() {
      // Get numbers from inputs
      const halifax = parseFloat(document.getElementById('input-halifax').value) || 0;
      const barclays = parseFloat(document.getElementById('input-barclays').value) || 0;
      const starling = parseFloat(document.getElementById('input-starling').value) || 0;
      const pendingBills = parseFloat(document.getElementById('input-bills').value) || 0;

      // Do the Math
      const totalCash = halifax + barclays + starling;
      const safeToSpend = totalCash - pendingBills;

      // Update the Big Numbers
      const safeEl = document.getElementById('safe-to-spend');
      safeEl.innerText = `£${safeToSpend.toFixed(2)}`;
      
      // Color logic for overdrafts
      if (safeToSpend < 0) {
        safeEl.classList.add('text-red-500');
        safeEl.classList.remove('text-white');
      } else {
        safeEl.classList.remove('text-red-500');
        safeEl.classList.add('text-white');
      }

      document.getElementById('total-cash').innerText = `£${totalCash.toFixed(2)}`;
      document.getElementById('display-bills').innerText = `£${pendingBills.toFixed(2)}`;

      // Update Bank Vaults
      document.getElementById('display-halifax').innerText = `£${halifax.toFixed(2)}`;
      document.getElementById('display-starling').innerText = `£${starling.toFixed(2)}`;

      const displayBarclays = document.getElementById('display-barclays');
      const warningBarclays = document.getElementById('barclays-warning');
      displayBarclays.innerText = `£${barclays.toFixed(2)}`;

      if (barclays < 0) {
        displayBarclays.classList.add('text-red-400');
        warningBarclays.classList.remove('hidden');
      } else {
        displayBarclays.classList.remove('text-red-400');
        warningBarclays.classList.add('hidden');
      }

      // Calculate Progress Bar (Health Bar)
      let safePercent = 0;
      let billsPercent = 0;
      
      if (totalCash > 0) {
        if (safeToSpend > 0) {
          safePercent = Math.round((safeToSpend / totalCash) * 100);
          billsPercent = Math.round((pendingBills / totalCash) * 100);
        } else {
          billsPercent = 100; // Bills ate everything
        }
      }

      // Animate the bar
      const barEl = document.getElementById('cash-bar');
      barEl.style.width = `${safePercent}%`;
      
      // Color the bar red if things are bad
      if (safePercent < 20) {
        barEl.className = "bg-red-500 h-1.5 rounded-full transition-all duration-1000 ease-out";
      } else {
        barEl.className = "bg-starling h-1.5 rounded-full transition-all duration-1000 ease-out";
      }

      document.getElementById('safe-percent').innerText = `${safePercent}%`;
      document.getElementById('bills-percent').innerText = `${billsPercent}%`;

      // Save everything to phone memory
      localStorage.setItem('bankData', JSON.stringify({ halifax, barclays, starling, pendingBills }));

      // Close menu & Vibrate
      if (navigator.vibrate) navigator.vibrate([30, 50, 30]); // Success double-buzz
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    // Boot Up Data
    function loadData() {
      const savedData = JSON.parse(localStorage.getItem('bankData'));
      if (savedData) {
        document.getElementById('input-halifax').value = savedData.halifax;
        document.getElementById('input-barclays').value = savedData.barclays;
        document.getElementById('input-starling').value = savedData.starling;
        
        // Handle older saves that didn't have bills
        if (savedData.pendingBills !== undefined) {
          document.getElementById('input-bills').value = savedData.pendingBills;
        } else {
          document.getElementById('input-bills').value = 450;
        }
        
        updateApp(); 
      }
    }

    saveBtn.addEventListener('click', updateApp);
    loadData();
  </script>
</body>
</html>
