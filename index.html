<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Command Center</title>
  
  <link rel="stylesheet" href="./style.css">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0F172A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class', 
      theme: { extend: { colors: { starling: '#00E6C3', darkbg: '#0F172A', cardbg: '#1E293B', lightbg: '#F8FAFC', lightcard: '#FFFFFF' } } }
    }
  </script>
</head>

<body class="p-4 relative min-h-screen bg-lightbg dark:bg-darkbg text-slate-900 dark:text-white transition-colors duration-300">

  <header class="flex justify-between items-center mb-4 pt-4">
    <div>
      <h1 class="text-2xl font-black tracking-tight flex items-center gap-2">
        Command <span class="text-starling">Center</span>
      </h1>
      <p class="text-slate-500 dark:text-gray-400 text-sm font-medium" id="date-display">Loading...</p>
    </div>
  </header>

  <div id="alerts-container" class="mb-4 space-y-2"></div>

  <div class="bg-lightcard dark:bg-gradient-to-br dark:from-cardbg dark:to-gray-900 rounded-3xl p-6 border border-slate-200 dark:border-gray-800 shadow-xl mb-6 relative overflow-hidden">
    <div class="flex justify-between items-center mb-1 relative z-10">
      <p class="text-slate-500 dark:text-gray-400 font-bold uppercase tracking-wide text-[10px]">Net Position</p>
      <button id="nav-analytics" class="text-[10px] bg-slate-100 dark:bg-gray-800 text-starling px-3 py-1.5 rounded-full font-black shadow-sm active:scale-95 flex items-center gap-1">
        <i data-lucide="bar-chart-3" class="w-3 h-3"></i> ANALYTICS
      </button>
    </div>
    <h2 class="text-5xl font-black tracking-tighter transition-colors relative z-10 my-2" id="safe-to-spend">£0.00</h2>
    <div class="w-full bg-slate-100 dark:bg-gray-800 rounded-full h-2 mt-4 mb-3 overflow-hidden relative z-10 shadow-inner">
      <div id="cash-bar" class="bg-starling h-2 rounded-full transition-all duration-1000 ease-out" style="width: 0%"></div>
    </div>
    <p class="text-xs text-slate-500 dark:text-gray-400 border-t border-slate-100 dark:border-gray-700/50 pt-3 mt-4 relative z-10 flex justify-between">
      <span>Available: <span id="total-cash" class="font-bold text-slate-800 dark:text-white">£0.00</span></span>
      <span>Bills Left: <span id="display-bills" class="font-bold text-red-500">£0.00</span></span>
    </p>
  </div>

  <div class="flex justify-between items-center mb-3">
    <h3 class="text-lg font-black tracking-tight">Accounts</h3>
    <button id="view-history-btn" class="text-xs bg-slate-200 dark:bg-gray-800 text-slate-700 dark:text-starling px-3 py-1.5 rounded-full font-bold flex items-center gap-1">
      <i data-lucide="history" class="w-3 h-3"></i> History
    </button>
  </div>
  <div class="space-y-3 mb-6" id="accounts-list"></div>

  <h3 class="text-lg font-black tracking-tight mb-3">Calendar</h3>
  <div class="bg-lightcard dark:bg-cardbg rounded-3xl p-5 border border-slate-200 dark:border-gray-800 shadow-lg">
    <div id="upcoming-list" class="space-y-3"></div>
    <p id="no-upcoming" class="text-sm text-slate-400 dark:text-gray-500 text-center py-2 hidden font-medium">Clear for now!</p>
  </div>

  <nav class="fixed bottom-0 left-0 w-full bg-white/90 dark:bg-cardbg/90 backdrop-blur-xl border-t border-slate-200 dark:border-gray-800 p-4 flex justify-between px-8 items-center rounded-t-3xl z-40 pb-6 transition-colors duration-300">
    <button onclick="window.scrollTo(0,0)" class="flex flex-col items-center text-slate-400 dark:text-gray-500 hover:text-starling transition-colors">
      <i data-lucide="home" class="w-6 h-6"></i><span class="text-[8px] mt-1 font-black tracking-widest">HOME</span>
    </button>
    <button id="nav-cashflow" class="flex flex-col items-center text-slate-400 dark:text-gray-500 hover:text-starling transition-colors">
      <i data-lucide="calendar" class="w-6 h-6"></i><span class="text-[8px] mt-1 font-black tracking-widest">BILLS</span>
    </button>
    <button id="add-btn" class="flex flex-col items-center text-slate-900 dark:text-starling -mt-12 bg-white dark:bg-darkbg rounded-full p-4 border-4 border-slate-100 dark:border-cardbg shadow-2xl transform active:scale-90 transition-transform">
      <i data-lucide="plus" class="w-8 h-8"></i>
    </button>
    <button id="nav-vault" class="flex flex-col items-center text-slate-400 dark:text-gray-500 hover:text-yellow-400 transition-colors">
      <i data-lucide="shield-check" class="w-6 h-6"></i><span class="text-[8px] mt-1 font-black tracking-widest">VAULT</span>
    </button>
    <button id="nav-admin" class="flex flex-col items-center text-slate-400 dark:text-gray-500 hover:text-white transition-colors">
      <i data-lucide="settings" class="w-6 h-6"></i><span class="text-[8px] mt-1 font-black tracking-widest">ADMIN</span>
    </button>
  </nav>

  <div id="modal-container"></div>

  <script src="./app.js"></script>
  <script>
    // Initialize Lucide Icons after the page loads
    lucide.createIcons();
  </script>
</body>
</html>
